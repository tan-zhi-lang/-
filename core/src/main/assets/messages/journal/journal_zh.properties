journal.document.jane_page.d.title=\u53EF\u6076\u7684\u8718\u86DB\u574F\u86CB
journal.document.jane_page.d.body=\u5728\u6211\u751F\u6D3B\u7684\u65F6\u95F4\u91CC\uFF0C\u6211\u770B\u5230\u8FC7\u5F88\u591A\u540C\u4F34\uFF0C\u4ED6\u4EEC\u4E5F\u5728\u8FD9\u91CC\u5C45\u4F4F\uFF0C\u4E0D\u8FC7\u5F88\u5FEB\u4ED6\u4EEC\u5C31\u88AB\u72E1\u733E\u7684\u8718\u86DB\u7ED9\u5403\u4E86\u3002\n\n\
\u8718\u86DB\u4EEC\u65BD\u4E0B\u7684\u8718\u86DB\u7F51\u65E0\u6BD4\u96BE\u7F20\uFF0C\u800C\u4E14\u8FFD\u4E0A\u53BB\u53C8\u8FFD\u4E0D\u5230\u5B83\u4EEC\uFF0C\u5728\u4F60\u78B0\u5230\u8718\u86DB\u7F51\u7684\u90A3\u4E00\u523B\uFF0C\u4F60\u5C31\u5DF2\u7ECF\u8981\u88AB\u8718\u86DB\u65BD\u6BD2\u4E86\u3002\n\n\
\u672C\u6765\u8FD8\u662F\u8F7B\u6BD2\uFF0C\u4F46\u662F\u968F\u7740\u65F6\u95F4\u7684\u63A8\u79FB\uFF0C\u6BD2\u6027\u4F1A\u8D8A\u6765\u8D8A\u5927\u3002\n\n\
\u6211\u51FB\u6740\u4E86\u51E0\u53EA\u8718\u86DB\uFF0C\u8BD5\u7740\u505A\u89E3\u836F\uFF0C\u4F46\u662F\u6CA1\u7528\u3002\n\n\
\u8718\u86DB\u4EEC\u975E\u5E38\u7684\u53EF\u6076\uFF0C\u65F6\u957F\u6765\u9A9A\u6270\u6211\u7684\u5C45\u4F4F\u6240\uFF0C\u8FD8\u8BBE\u7F6E\u969C\u788D\u7269\u6765\u963B\u6321\u6211\u4EEC\u7684\u8DEF\u6BB5\u3002\n\n\
\u4E0D\u8FC7\u6211\u53D1\u73B0\u8FD9\u4E9B\u8718\u86DB\u65BD\u7684\u7F51\u90FD\u6709\u4E00\u4E2A\u89C4\u5F8B\uFF0C\u90FD\u4F1A\u53BB\u963B\u6321\u6211\u4EEC\u53BB\u5BFB\u627E\u5B9D\u7BB1\u602A\uFF0C\u8FD9\u592A\u4E0D\u53EF\u601D\u8BAE\u4E86\u3002

