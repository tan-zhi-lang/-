journal.document.caves_explorer.expedition.body=\u590F\u5F52\u4E00\u65E5\uFF0C\u53C1\u96F6\u634C\u5E74\n\n\u5C31\u5728\u4ECA\u5929\uFF0C\u6211\u4EEC\u5728\u5E9F\u5F03\u77EE\u4EBA\u77FF\u4E95\u4E3A\u671F\u56DB\u5468\u7684\u63A2\u9669\u5F00\u59CB\u4E86\uFF01\u6211\u5DF2\u5949\u965B\u4E0B\u4EB2\u81EA\u9881\u53D1\u7684\u8C15\u65E8\u524D\u6765\u63A2\u7D22\u6B64\u5904\u3002\u6211\u7684\u9996\u8981\u76EE\u6807\u662F\u63A2\u660E\u6240\u6709\u8FD8\u672A\u53D1\u73B0\u7684\u77FF\u85CF\uFF0C\u5E76\u8003\u5BDF\u8FD9\u91CC\u662F\u5426\u80FD\u6EE1\u8DB3\u4E00\u4E2A\u76D1\u72F1\u5EFA\u8BBE\u89C4\u5212\u7684\u6761\u4EF6\u3002\n\n\u5C3D\u7BA1\u6211\u5B8C\u5168\u6709\u80FD\u529B\u81EA\u536B\uFF0C\u4F46\u5728\u965B\u4E0B\u7684\u575A\u6301\u4E0B\uFF0C\u6211\u8FD8\u662F\u63A5\u53D7\u4E86\u4E00\u652F\u7531\u57CE\u5E02\u5B88\u536B\u7EC4\u6210\u7684\u62A4\u536B\u961F\u4E3A\u6211\u63D0\u4F9B\u4FDD\u62A4\u3002\u4ED6\u4EEC\u90FD\u662F\u4E00\u7FA4\u6123\u5934\u9752\uFF0C\u4E0D\u8FC7\u53EA\u8981\u4E0D\u62D6\u6211\u7684\u540E\u817F\uFF0C\u90A3\u5C31\u968F\u4ED6\u4EEC\u53BB\u5427\u3002\n\n\u6211\u4F30\u8BA1\u6211\u4EEC\u80FD\u5728\u665A\u4E0A\u901A\u8FC7\u4E0B\u6C34\u9053\u5230\u8FBE\u77FF\u4E95\u3002\n\u2014\u2014\u5357\u65B9\u5DEB\u5E08\u5B66\u9662\uFF0C\u9B54\u5BFC\u5E08\u4E9A\u5947\u535A\u5C14\u5FB7\u00B7\u5FB7\u62C9\u8499\u5FB7
