journal.document.prison_warden.mines.body=\u51AC\u8D77\u4E94\u5341\u56DB\u65E5\uFF0C\u53C1\u9646\u53C1\u5E74\n\n\u4ECA\u5929\u6709\u4E00\u7FA4\u5E02\u5E9C\u7684\u5DE5\u7A0B\u5E08\u5230\u8BBF\uFF0C\u58F0\u79F0\u8981\u6765\u5C01\u95ED\u4E0B\u9762\u77FF\u4E95\u7684\u65E7\u5165\u53E3\u3002\u5E02\u5E9C\u5927\u6982\u662F\u4E0D\u60F3\u518D\u8017\u8D39\u4EBA\u529B\u6765\u7BA1\u7406\u5B83\u4E86\u3002\u548C\u5F80\u5E38\u4E00\u6837\uFF0C\u4ED6\u4EEC\u6CA1\u6709\u4E8B\u5148\u901A\u77E5\u6211\u3002\n\n\u4ED6\u4EEC\u4E2D\u7684\u9886\u961F\u8FD8\u540C\u6211\u63D0\u5230\u6709\u4EC0\u4E48\u77EE\u4EBA\u9B54\u529B\u6B63\u4ECE\u77FF\u4E95\u4E2D\u9038\u6563\u800C\u51FA\u3002\u6211\u53CD\u6B63\u662F\u4E0D\u4FE1\u90A3\u9B3C\u8BDD\u3002\n\n\u5728\u65B0\u72F1\u5352\u4EEC\u7684\u5E2E\u52A9\u4E0B\uFF0C\u76D1\u72F1\u7684\u60C5\u51B5\u597D\u8F6C\u4E86\u4E0D\u5C11\uFF0C\u4F46\u662F\u95EE\u9898\u7684\u6839\u6E90\u5E76\u6CA1\u6709\u67E5\u660E\uFF0C\u6BEB\u65E0\u7591\u95EE\uFF0C\u8FD9\u91CC\u6709\u4EC0\u4E48\u4E1C\u897F\u5728\u5F71\u54CD\u7740\u56DA\u72AF\uFF0C\u8FD9\u80AF\u5B9A\u4E5F\u4E0D\u662F\u62C6\u51E0\u9762\u5899\u5C31\u80FD\u89E3\u51B3\u7684\u95EE\u9898\u3002\n\u2014\u2014\u53F2\u5BC6\u65AF
