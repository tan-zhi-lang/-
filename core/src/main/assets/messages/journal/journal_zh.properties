journal.document.prison_warden.recruits.body=\u6625\u81F3\u516B\u5341\u65E5\uFF0C\u53C1\u9646\u8D30\u5E74\n\n\u6309\u7167\u7EA6\u5B9A\uFF0C\u4ECA\u5929\u6709\u4E00\u6279\u65B0\u72F1\u5352\u6765\u62A5\u9053\u3002\u548C\u5F80\u5E38\u4E00\u6837\uFF0C\u6709\u80FD\u529B\u7684\u72F1\u5352\u4E0D\u591A\uFF0C\u5F88\u591A\u53EA\u662F\u8C6A\u8D4F\u4E4B\u4E0B\u524D\u6765\u6295\u540D\u7684\u83BD\u592B\u3002\u4E0D\u7BA1\u600E\u6837\uFF0C\u4ED6\u4EEC\u7684\u86EE\u529B\u5728\u7BA1\u6559\u90A3\u4E9B\u4E0D\u542C\u8BDD\u7684\u72AF\u4EBA\u65F6\u8FD8\u662F\u633A\u6709\u7528\u7684\u3002\n\n\u8EAB\u5904\u4F17\u4EBA\u4E4B\u4E0A\uFF0C\u57F9\u517B\u51E0\u4E2A\u5FC3\u8179\u7684\u91CD\u8981\u6027\u4E0D\u8A00\u800C\u55BB\u3002\u5728\u8FD9\u6279\u65B0\u4EBA\u4E2D\uFF0C\u6258\u9A6C\u65AF\u7684\u80FD\u529B\u4F3C\u4E4E\u53EF\u582A\u6B64\u4EFB\u3002\u773C\u4E0B\u6211\u9700\u8981\u4EFB\u4F55\u5F62\u5F0F\u7684\u5E2E\u52A9\uFF0C\u5982\u679C\u4ED6\u8868\u73B0\u4E0D\u9519\uFF0C\u6211\u4F1A\u591A\u591A\u63D0\u62D4\u4ED6\u3002\n\u2014\u2014\u53F2\u5BC6\u65AF
