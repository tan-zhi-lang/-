journal.document.caves_explorer.gold.body=\u590F\u5F52\u56DB\u65E5\uFF0C\u53C1\u96F6\u634C\u5E74\n\n\u6211\u4EEC\u5934\u51E0\u5929\u7684\u6536\u83B7\u771F\u7B97\u5F97\u4E0A\u662F\u76C6\u6EE1\u94B5\u6EE1\uFF01\u5EFA\u597D\u8425\u5730\u4E4B\u540E\uFF0C\u6211\u4EEC\u521D\u6B65\u63A2\u67E5\u4E86\u4E00\u4E0B\u5E9F\u5F03\u77FF\u4E95\u7684\u4E0A\u5C42\u90E8\u5206\u3002\u867D\u7136\u8FD9\u91CC\u6709\u5F88\u591A\u77EE\u4EBA\u9057\u7559\u7684\u5E9F\u5F03\u7269\uFF0C\u4F46\u6211\u4EEC\u53D1\u73B0\u6D1E\u7A9F\u7684\u5F88\u591A\u77F3\u58C1\u91CC\u4E5F\u5145\u6EE1\u4E86\u9EC4\u91D1\uFF01\n\n\u4E0D\u5E78\u7684\u662F\uFF0C\u6211\u4EEC\u5E76\u4E0D\u662F\u7B2C\u4E00\u6279\u5230\u8FD9\u6765\u7684\u3002\u6D1E\u7A9F\u91CC\u5230\u5904\u90FD\u662F\u6B66\u5FB7\u5145\u6C9B\u7684\u91CE\u751F\u52A8\u7269\uFF0C\u5E76\u4E14\u4E00\u7FA4\u7FA4\u7684\u8C7A\u72FC\u4EBA\u8C8C\u4F3C\u4E5F\u5BF9\u9EC4\u91D1\u6709\u7740\u6D53\u539A\u7684\u5174\u8DA3\u3002\u6211\u627F\u8BA4\u6211\u5BF9\u6211\u90A3\u62A4\u536B\u961F\u7684\u8BC4\u4EF7\u6709\u70B9\u592A\u523B\u8584\u4E86\uFF0C\u5176\u5B9E\u4ED6\u4EEC\u662F\u4E00\u7FA4\u6BD4\u6211\u60F3\u8C61\u4E2D\u66F4\u6709\u80FD\u8010\u7684\u63A2\u9669\u8005\u548C\u4FDD\u9556\u3002\n\n\u5C3D\u7BA1\u53D6\u5F97\u4E86\u8FD9\u6837\u7684\u6210\u529F\uFF0C\u8FD9\u77FF\u4E95\u8FD8\u6709\u5F88\u591A\u533A\u57DF\u7B49\u5F85\u6211\u4EEC\u53BB\u63A2\u7D22\u3002\n\u2014\u2014\u4E9A\u5947\u535A\u5C14\u5FB7
