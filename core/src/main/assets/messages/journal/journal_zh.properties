journal.document.prison_warden.rotberry.body=\u79CB\u4E34\u4E8C\u5341\u4E09\u65E5\uFF0C\u53C1\u9646\u53C1\u5E74\n\n\u4ECA\u65E5\u6536\u5230\u4E86\u83F2\u5229\u65AF\u8D60\u9001\u7684\u4E00\u4EF6\u5999\u793C\uFF0C\u662F\u4E00\u682A\u4EAE\u7EA2\u8272\u7684\u704C\u6728\u4E1B\uFF0C\u540D\u4E3A\u201C\u8150\u8393\u201D\u3002\n\n\u6211\u4E4B\u524D\u8DDF\u4ED6\u62B1\u6028\u8FC7\u8FD9\u4E2A\u5730\u65B9\u6709\u591A\u4E48\u51B7\u6E05\uFF0C\u770B\u6765\u8FD9\u662F\u4ED6\u7684\u56DE\u5E94\u3002\u4ED6\u8BF4\u8FD9\u79CD\u690D\u7269\u53CD\u800C\u6015\u5149\u6015\u6C34\uFF0C\u53EA\u9700\u8981\u6BCF\u6708\u4FEE\u526A\u679D\u53F6\u5C31\u53EF\u4EE5\u517B\u6D3B\u3002\u4FEE\u526A\u7684\u5FC5\u8981\u6027\u80FD\u4ECE\u4ED6\u5728\u4FE1\u91CC\u5341\u6570\u904D\u7684\u53CD\u590D\u5F3A\u8C03\u8BFB\u51FA\u6765\u3002\n\n\u4E0D\u8FC7\uFF0C\u83F2\u5229\u65AF\u5F53\u7136\u4E0D\u4F1A\u505A\u6CA1\u6709\u56DE\u62A5\u7684\u4E8B\u60C5\u3002\u4ED6\u8BF4\u8FD9\u4E2A\u4E1C\u897F\u7ED3\u4E0B\u7684\u7C7D\u662F\u5236\u4F5C\u6CD5\u6756\u7684\u597D\u6750\u6599\uFF0C\u6240\u4EE5\u5B83\u6BCF\u6B21\u7ED3\u7C7D\u540E\u6211\u90FD\u9700\u8981\u7ED9\u4ED6\u5BC4\u56DE\u4E00\u628A\u3002\u5C31\u5F53\u6B20\u4ED6\u7684\u4E86\u3002\n\u2014\u2014\u53F2\u5BC6\u65AF
